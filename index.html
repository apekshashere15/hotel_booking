<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Luxury Hotel Booking</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="main-overlay">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-lg-5 col-md-8">

                    <div class="form-container">
                        <h3 class="luxury-title">Luxury Hotel Booking</h3>

                        <form id="bookingForm">
                            <div id="formAlert"></div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Check-in Date</label>
                                    <input type="text" id="checkin" class="form-control" placeholder="Select Date"
                                        readonly required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Check-out Date</label>
                                    <input type="text" id="checkout" class="form-control" placeholder="Select Date"
                                        readonly required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Room Type</label>
                                <select id="roomType" class="form-select" required>
                                    <option value="" selected disabled>Select Room</option>
                                    <option value="Single">Single - ₹3000/night</option>
                                    <option value="Double">Double - ₹5000/night</option>
                                    <option value="Suite">Suite - ₹8000/night</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Guests</label>
                                <div class="guest-box">
                                    <div class="d-flex justify-content-between align-items-center mb-2">
                                        <span>Adults</span>
                                        <div class="counter-controls">
                                            <button type="button" class="btn btn-sm btn-outline-secondary"
                                                id="adultMinus">−</button>
                                            <span id="adultCount" class="mx-2 fw-bold">1</span>
                                            <button type="button" class="btn btn-sm btn-outline-secondary"
                                                id="adultPlus">+</button>
                                        </div>
                                    </div>
                                    <div class="d-flex justify-content-between align-items-center">
                                        <span>Children</span>
                                        <div class="counter-controls">
                                            <button type="button" class="btn btn-sm btn-outline-secondary"
                                                id="childMinus">−</button>
                                            <span id="childCount" class="mx-2 fw-bold">0</span>
                                            <button type="button" class="btn btn-sm btn-outline-secondary"
                                                id="childPlus">+</button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Special Requests</label>
                                <textarea id="requests" class="form-control" rows="2"
                                    placeholder="Any extra requirements?"></textarea>
                            </div>

                            <!-- Payment Method -->
                            <div class="mb-3">
                                <label class="form-label">Payment Method</label>

                                <select id="paymentMethod" class="form-select" required>
                                    <option value="">Select Payment</option>
                                    <option value="UPI">UPI</option>
                                    <option value="Card">Credit / Debit Card</option>
                                    <option value="Cash">Pay at Hotel</option>
                                </select>
                            </div>
                            <div class="price-breakdown mb-3">
                                <div class="d-flex justify-content-between">
                                    <span>Room Total:</span>
                                    <span>₹ <span id="roomTotal">0</span></span>
                                </div>
                                <div class="d-flex justify-content-between">
                                    <span>GST (18%):</span>
                                    <span>₹ <span id="gstAmount">0</span></span>
                                </div>
                                <hr>
                                <div class="d-flex justify-content-between align-items-center">
                                    <h5 class="mb-0 fw-bold">Grand Total:</h5>
                                    <h5 class="mb-0 fw-bold text-success">₹ <span id="grandTotal">0</span></h5>
                                </div>
                            </div>

                            <div id="errorMsg" class="text-danger small mb-2"></div>

                            <button type="submit" class="btn-gold w-100">
                                Confirm Booking
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="bookingModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0">
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center pb-5">
                    <div class="mb-3 text-success">
                        <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" fill="currentColor"
                            class="bi bi-check-circle-fill" viewBox="0 0 16 16">
                            <path
                                d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z" />
                        </svg>
                    </div>
                    <h4>Booking Confirmed!</h4>
                    <p id="bookingDetails" class="text-muted"></p>
                    <button class="btn btn-success mt-3" id="downloadReceipt">
                        Download Receipt
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="script.js"></script>

    <!-- Booking Loading Animation -->
<div id="bookingLoader" class="loader-container">
  <div class="loader"></div>
  <p>Processing your booking...</p>
</div>
</body>

</html>
